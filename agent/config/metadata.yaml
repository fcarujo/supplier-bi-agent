          FROM `{project}.{dataset}.orders`
          WHERE supplierID = '{supplier_id}'
            AND orderDate >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
          GROUP BY
            productSKU, productCategory, productPriceTier, fulfilmentChannel
          ORDER BY total_incidents DESC, total_orders DESC

      incidents:
        allowed_columns:
          - incidentID
          - orderID
          - supplierID
          - productCategory
          - productSKU
          - incidentDate
          - resolutionStatus
          - incidentType
          - incidentResolution
          - resolutionCost
          - productRating
          - incidentCustomerComment
          - customerReview
          - daysBetweenPurchaseAndIncident
        sql_template: |
          SELECT
            i.supplierID,
            i.productSKU,
            i.productCategory,
            i.incidentType,
            i.incidentResolution,
            i.resolutionStatus,
            COUNT(i.incidentID)                           AS total_incidents,
            ROUND(SUM(i.resolutionCost), 2)               AS total_resolution_cost,
            ROUND(AVG(i.resolutionCost), 2)               AS avg_resolution_cost,
            ROUND(AVG(i.productRating), 2)                AS avg_product_rating,
            ROUND(AVG(i.daysBetweenPurchaseAndIncident), 1) AS avg_days_to_incident
          FROM `{project}.{dataset}.incidents` i
          INNER JOIN `{project}.{dataset}.orders` o ON i.orderID = o.orderID
          WHERE o.orderDate >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
            AND i.supplierID = '{supplier_id}'
          GROUP BY
            i.supplierID, i.productSKU, i.productCategory, i.incidentType,
            i.incidentResolution, i.resolutionStatus
          ORDER BY total_incidents DESC

      returns:
        allowed_columns:
          - returnID
          - orderID
          - supplierID
          - productCategory
          - productSKU
          - returnDate
          - resolutionStatus
          - buyersRemorseReason
          - buyersRemorseComment
          - productRating
          - customerReview
          - daysBetweenPurchaseAndReturn
