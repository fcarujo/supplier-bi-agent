          - grossRevenue
          - netRevenue
          - productCost
          - fulfilmentChannel
          - supplierTier
          - supplierRegion
          - productPriceTier
          - hasIncident
          - hasReturn
          - unitQuantity
        sql_template: |
          SELECT
            supplierID,
            supplierTier,
            supplierRegion,
            productCategory,
            fulfilmentChannel,
            productPriceTier,
            COUNT(orderID)                                                    AS total_orders,
            SUM(unitQuantity)                                                 AS total_units,
