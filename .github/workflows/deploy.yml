name: Deploy to Cloud Run

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit — control plane
        run: |
          bandit -r control_plane/ \
            --exclude control_plane/frontend \
            -l -i --configfile .bandit -f txt

      - name: Bandit — agent nodes
        run: |
          bandit -r agent/ \
            --exclude agent/.venv \
            -l -i --configfile .bandit -f txt

      - name: pip-audit — control plane
        run: |
          pip-audit \
            -r control_plane/requirements.txt \
            --ignore-vuln GHSA-w235-7p84-xx57

      - name: pip-audit — data pipeline
        run: pip-audit -r data/daily_append/requirements.txt

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: security
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build frontend
        run: |
          cd control_plane/frontend
          npm ci
          npm run build
          cd ..
          cp -r frontend/dist/* static/

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy supplier-bi-control-plane \
            --source . \
            --region europe-west2 \
            --project ${{ secrets.GCP_PROJECT }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars GCP_PROJECT=${{ secrets.GCP_PROJECT }},BQ_DATASET=supplier_bi,ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
            --memory 1Gi \
            --timeout 300 \
            --min-instances 1

      - name: Confirm deployment
        run: |
          gcloud run services describe supplier-bi-control-plane \
            --region europe-west2 \
            --project ${{ secrets.GCP_PROJECT }} \
            --format="value(status.url)"
