name: Security Checks

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  security:
    name: Bandit + pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit — control plane
        run: |
          bandit -r control_plane/ \
            --exclude control_plane/frontend \
            -l -i \
            --configfile .bandit \
            -f txt

      - name: Bandit — agent nodes
        run: |
          bandit -r agent/ \
            --exclude agent/.venv \
            -l -i \
            --configfile .bandit \
            -f txt

      - name: pip-audit — control plane
        run: |
          pip-audit \
            -r control_plane/requirements.txt \
            --ignore-vuln GHSA-w235-7p84-xx57

      - name: pip-audit — data pipeline
        run: pip-audit -r data/daily_append/requirements.txt
